<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blocksmith — Hyrox Carousel 1:1 - Slide 5</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bs-amber: oklch(57% 0.18 42);
      --bs-destructive: oklch(57.7% 0.245 27.3);
      --bs-recovery: #047857;
      --bs-recovery-bg: rgba(4, 120, 87, 0.10);
      --bs-recovery-border: rgba(4, 120, 87, 0.28);
      --bs-destruct-bg: oklch(57.7% 0.245 27.3 / 0.09);
      --bs-destruct-border: oklch(57.7% 0.245 27.3 / 0.28);
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      padding: 40px 20px;
    }
    .label {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 8px;
    }
    .slide-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .slide {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      flex-shrink: 0;
      background: #000;
    }

    /* SLIDE-5-SPECIFIC STYLES */
    .slide-5 {
        background: linear-gradient(160deg, #1a1a1a 0%, #0a0a0a 60%, oklch(0.12 0.04 27.3) 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px 100px;
        color: #fff;
        text-align: center;
    }
    .slide-5 .icon {
        font-size: 150px;
        margin-bottom: 40px;
        color: var(--bs-destructive);
    }
    .slide-5 .title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 100px;
        line-height: 1;
        margin-bottom: 30px;
        letter-spacing: 2px;
        text-transform: uppercase;
    }
    .slide-5 .text {
        font-size: 34px;
        line-height: 1.4;
        font-weight: 400;
        color: #ccc;
    }
    .slide-5 .highlight {
        color: var(--bs-destructive);
        font-weight: 700;
    }
    .slide-5 .counter {
      position: absolute;
      top: 50px;
      left: 50px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 80px;
      color: #fff;
      opacity: 0.2;
    }
    

    /* For ?slide=N screenshotting */
    body.capture-mode {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      background: #000;
      padding: 0;
      gap: 0;
    }
    body.capture-mode .slide-wrapper { display: none; }
    body.capture-mode .slide-wrapper.active {
      display: block;
    }
    body.capture-mode .label { display: none; }
    body.capture-mode .slide { border-radius: 0; }
  </style>
</head>
<body>

<div class="slide-wrapper active">
  <div class="label">Slide 5 — Unbalanced Training</div>
  <div class="slide slide-5">
    <div class="counter">05</div>
    <div class="icon">💪</div>
    <div class="title">Unbalanced Training</div>
    <div class="text">
      Ignoring strength work or neglecting specific HYROX movements will limit your potential.
      Build a <span class="highlight">well-rounded program</span> for peak performance.
    </div>
  </div>
</div>

<script>
  // ?slide=N — isolates one slide for screenshotting.
  // Navigate to e.g. /templates/instagram-carousel-1x1.html?slide=1 then screenshot.
  const n = new URLSearchParams(location.search).get("slide");
  if (n) {
    const idx = parseInt(n, 10);
    document.body.classList.add("capture-mode");
    const wrappers = document.querySelectorAll(".slide-wrapper");
    wrappers.forEach((el, i) => {
      if (i + 1 === idx) el.classList.add("active");
    });
  }
</script>

</body>
</html>
