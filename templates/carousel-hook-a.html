<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blocksmith — Carousel Hook A</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700;900&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --amber:       oklch(60% 0.18 42);
    --destructive: oklch(57.7% 0.245 27.3);
    --recovery:    #047857;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #000;
    font-family: 'DM Sans', sans-serif;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 88px;
  }

  /* Faint diagonal texture */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -55deg,
      transparent,
      transparent 60px,
      rgba(255,255,255,0.012) 60px,
      rgba(255,255,255,0.012) 61px
    );
    pointer-events: none;
  }

  .brand {
    position: absolute;
    top: 52px;
    right: 60px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 6px;
    color: rgba(255,255,255,0.2);
  }

  .eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 32px;
    position: relative;
    z-index: 1;
  }

  .hook {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 120px;
    line-height: 0.88;
    color: #fff;
    letter-spacing: 1px;
    position: relative;
    z-index: 1;
  }

  .hook .amber { color: var(--amber); }
  .hook .muted { color: rgba(255,255,255,0.35); }

  .sub {
    font-family: 'DM Sans', sans-serif;
    font-size: 24px;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    margin-top: 44px;
    max-width: 620px;
    line-height: 1.5;
    position: relative;
    z-index: 1;
  }

  .swipe-cta {
    position: absolute;
    bottom: 60px;
    right: 64px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }

  .swipe-arrow {
    width: 32px;
    height: 1px;
    background: rgba(255,255,255,0.3);
    position: relative;
  }

  .swipe-arrow::after {
    content: '';
    position: absolute;
    right: -1px;
    top: -3px;
    border-left: 7px solid rgba(255,255,255,0.3);
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
  }

  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 8px;
    background: var(--amber);
  }
</style>
</head>
<body>

<div class="brand" data-param="brand">BLOCKSMITH</div>
<div class="eyebrow" data-param="eyebrow">HYROX training</div>
<div class="hook" data-param="hook">5 MISTAKES<br>KILLING YOUR<br><span class="amber">HYROX RACE</span></div>
<div class="sub" data-param="sub">Most athletes make at least 3 of these. Fix them and you'll find 60–90 seconds you didn't know you had.</div>

<div class="swipe-cta">
  <span data-param="swipe_label">Swipe</span>
  <div class="swipe-arrow"></div>
</div>

<div class="bottom-bar"></div>

<script>
  const p = new URLSearchParams(location.search);
  document.querySelectorAll('[data-param]').forEach(el => {
    const v = p.get(el.dataset.param);
    if (v) el.innerHTML = v;
  });
</script>
</body>
</html>
