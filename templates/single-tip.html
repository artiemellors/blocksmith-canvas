<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blocksmith — Single Tip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700;900&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --amber:       oklch(60% 0.18 42);
    --amber-bg:    oklch(60% 0.18 42 / 0.10);
    --amber-border: oklch(60% 0.18 42 / 0.25);
    --destructive: oklch(57.7% 0.245 27.3);
    --recovery:    oklch(50.8% 0.105 166);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #0a0a0a;
    font-family: 'DM Sans', sans-serif;
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 80px 88px;
  }

  .tip-label {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 52px;
  }

  .tip-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 4px;
    color: var(--amber);
    background: var(--amber-bg);
    border: 1px solid var(--amber-border);
    padding: 6px 16px;
    border-radius: 4px;
  }

  .tip-station {
    font-family: 'DM Sans', sans-serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }

  .tip-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 88px;
    line-height: 0.9;
    color: #fff;
    letter-spacing: 1px;
    flex: 1;
  }

  /* Amber left rule */
  .tip-body-wrapper {
    display: flex;
    gap: 32px;
    margin-top: 44px;
    flex: 1;
    align-items: flex-start;
  }

  .tip-rule {
    width: 4px;
    background: var(--amber);
    border-radius: 2px;
    flex-shrink: 0;
    align-self: stretch;
  }

  .tip-body {
    font-family: 'DM Sans', sans-serif;
    font-size: 48px;
    font-weight: 400;
    color: rgba(255,255,255,0.7);
    line-height: 1.55;
  }

  .tip-body strong {
    color: #fff;
    font-weight: 700;
  }

  .footer {
    position: absolute;
    bottom: 60px;
    left: 88px;
    right: 88px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.2);
  }

  .footer-url {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.5px;
  }

  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: var(--amber);
  }
</style>
</head>
<body>

<div class="tip-label">
  <div class="tip-number" data-param="tip_number">TIP 01</div>
  <div class="tip-station" data-param="station">Ski Erg</div>
</div>

<div class="tip-title" data-param="tip_title">PACE THE<br>FIRST 500M<br>CONSERVATIVELY</div>

<div class="tip-body-wrapper">
  <div class="tip-rule"></div>
  <div class="tip-body" data-param="tip_body">Most athletes go out <strong>too hard</strong> on the SkiErg and can't recover on the first run. <strong>Hold 5–8% below race pace</strong> for the first 500m, then build. You'll lose 2 seconds there and gain 15 on the run.</div>
</div>

<div class="footer">
  <div class="footer-brand" data-param="brand">BLOCKSMITH</div>
  <div class="footer-url">blocksmith.training</div>
</div>

<div class="bottom-bar"></div>

<script>
  const p = new URLSearchParams(location.search);
  document.querySelectorAll('[data-param]').forEach(el => {
    const v = p.get(el.dataset.param);
    if (v) el.innerHTML = v;
  });
</script>
</body>
</html>
