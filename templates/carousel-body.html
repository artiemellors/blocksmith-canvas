<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blocksmith — Carousel Body</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700;900&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --amber:           oklch(60% 0.18 42);
    --amber-bg:        oklch(60% 0.18 42 / 0.08);
    --amber-border:    oklch(60% 0.18 42 / 0.22);
    --destructive:     oklch(57.7% 0.245 27.3);
    --recovery:        oklch(50.8% 0.105 166);
    --recovery-bg:     oklch(50.8% 0.105 166 / 0.08);
    --recovery-border: oklch(50.8% 0.105 166 / 0.25);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #080808;
    font-family: 'DM Sans', sans-serif;
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 80px 88px;
  }

  .brand {
    position: absolute;
    top: 62px;
    left: 88px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 6px;
    color: rgba(255,255,255,0.2);
  }

  .content {
    margin-top: 120px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .step-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 24px;
  }

  .heading {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 88px;
    line-height: 0.9;
    color: #fff;
    letter-spacing: 1px;
    margin-bottom: 36px;
  }

  .body-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 28px;
    font-weight: 400;
    color: rgba(255,255,255,0.6);
    line-height: 1.55;
    max-width: 820px;
  }

  .body-text strong {
    color: rgba(255,255,255,0.9);
    font-weight: 700;
  }

  /* Optional data callout */
  .data-callout {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: 44px;
    padding: 24px 32px;
    background: var(--amber-bg);
    border: 1px solid var(--amber-border);
    border-radius: 6px;
    max-width: 700px;
  }

  .data-value {
    font-family: 'DM Mono', monospace;
    font-size: 44px;
    font-weight: 600;
    color: var(--amber);
    letter-spacing: -1px;
    white-space: nowrap;
  }

  .data-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    line-height: 1.4;
  }

  .data-callout.hidden { display: none; }

  .swipe-cta {
    position: absolute;
    bottom: 60px;
    right: 64px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
  }

  .swipe-arrow {
    width: 28px;
    height: 1px;
    background: rgba(255,255,255,0.2);
    position: relative;
  }

  .swipe-arrow::after {
    content: '';
    position: absolute;
    right: -1px;
    top: -3px;
    border-left: 7px solid rgba(255,255,255,0.2);
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
  }

  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: rgba(255,255,255,0.06);
  }

  .bottom-bar-fill {
    height: 100%;
    background: var(--amber);
    width: 40%; /* overridden by data-param="progress" */
  }
</style>
</head>
<body>

<div class="brand" data-param="brand">BLOCKSMITH</div>

<div class="content">
  <div class="step-label" data-param="step_label">Step 01</div>
  <div class="heading" data-param="heading">PACE YOUR<br>SKIERG FIRST</div>
  <div class="body-text" data-param="body">Hold <strong>5–8% below race pace</strong> for the opening 500m. Your legs are fresh and the temptation to sprint is high — don't. The run that follows is where this mistake becomes visible.</div>
  <div class="data-callout" id="callout">
    <div class="data-value" data-param="data_value">−90s</div>
    <div class="data-label" data-param="data_label">average time lost by athletes who overpace the SkiErg</div>
  </div>
</div>

<div class="swipe-cta">
  <span data-param="swipe_label">Next</span>
  <div class="swipe-arrow"></div>
</div>

<div class="bottom-bar">
  <div class="bottom-bar-fill" id="progress"></div>
</div>

<script>
  const p = new URLSearchParams(location.search);
  document.querySelectorAll('[data-param]').forEach(el => {
    const v = p.get(el.dataset.param);
    if (v) el.innerHTML = v;
  });
  // Hide data callout if no data_value provided
  if (!p.get('data_value')) document.getElementById('callout').classList.add('hidden');
  // Progress bar fill
  const prog = p.get('progress');
  if (prog) document.getElementById('progress').style.width = prog;
</script>
</body>
</html>
