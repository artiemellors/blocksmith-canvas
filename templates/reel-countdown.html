<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blocksmith — Race Countdown</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --amber:        oklch(60% 0.18 42);
    --amber-bg:     oklch(60% 0.18 42 / 0.10);
    --amber-border: oklch(60% 0.18 42 / 0.28);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #030303;
    font-family: 'DM Sans', sans-serif;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Full-bleed atmospheric bg image */
  .bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    z-index: 0;
  }

  /* Dense dark center, brightening slightly at edges */
  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg,
        oklch(2% 0 0 / 0.88) 0%,
        oklch(2% 0 0 / 0.72) 30%,
        oklch(2% 0 0 / 0.72) 70%,
        oklch(2% 0 0 / 0.92) 100%
      );
  }

  /* Top brand */
  .brand {
    position: absolute;
    top: 80px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 8px;
    color: rgba(255,255,255,0.18);
    z-index: 2;
  }

  /* Event label */
  .event-label {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 60px;
    position: relative;
    z-index: 2;
  }

  .event-line {
    width: 60px;
    height: 2px;
    background: var(--amber);
    flex-shrink: 0;
  }

  .event-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--amber);
  }

  /* The countdown number */
  .countdown-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 2;
  }

  .days-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 420px;
    line-height: 0.82;
    color: #fff;
    letter-spacing: -8px;
    text-align: center;
  }

  .days-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 36px;
    font-weight: 700;
    letter-spacing: 10px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-top: 20px;
  }

  /* Message below countdown */
  .message {
    font-family: 'DM Sans', sans-serif;
    font-size: 52px;
    font-weight: 400;
    color: rgba(255,255,255,0.60);
    line-height: 1.45;
    text-align: center;
    max-width: 800px;
    margin-top: 80px;
    position: relative;
    z-index: 2;
    padding: 0 80px;
  }

  .message strong {
    color: #fff;
    font-weight: 700;
  }

  /* Bottom rule + brand */
  .footer {
    position: absolute;
    bottom: 80px;
    left: 0;
    right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    z-index: 2;
  }

  .footer-rule {
    width: 80px;
    height: 3px;
    background: var(--amber);
    border-radius: 2px;
  }

  .footer-brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 6px;
    color: rgba(255,255,255,0.20);
  }

  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: var(--amber);
    z-index: 3;
  }
</style>
</head>
<body>

<div class="bg" id="bg"></div>

<div class="brand" data-param="brand">BLOCKSMITH</div>

<div class="event-label">
  <div class="event-line"></div>
  <div class="event-text" data-param="event">HYROX SYDNEY</div>
  <div class="event-line"></div>
</div>

<div class="countdown-wrapper">
  <div class="days-number" data-param="days">21</div>
  <div class="days-label">DAYS TO GO</div>
</div>

<div class="message" data-param="message">The work is done. Trust it. <strong>Race the plan.</strong></div>

<div class="footer">
  <div class="footer-rule"></div>
  <div class="footer-brand" data-param="brand">BLOCKSMITH</div>
</div>

<div class="bottom-bar"></div>

<script>
  const p = new URLSearchParams(location.search);
  document.querySelectorAll('[data-param]').forEach(el => {
    const v = p.get(el.dataset.param);
    if (v) el.innerHTML = v;
  });
  const bgUrl = p.get('bg_image');
  if (bgUrl) document.getElementById('bg').style.backgroundImage = `url(${bgUrl})`;
</script>
</body>
</html>
