<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blocksmith — Carousel CTA BG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700;900&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --amber:        oklch(60% 0.18 42);
    --amber-bg:     oklch(60% 0.18 42 / 0.16);
    --amber-border: oklch(60% 0.18 42 / 0.40);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #050505;
    font-family: 'DM Sans', sans-serif;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 88px;
  }

  /* Full-bleed background image */
  .bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    z-index: 0;
  }

  /* Heavy bottom gradient — keep the value-prop pill readable */
  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      oklch(2% 0 0 / 0.40) 0%,
      oklch(2% 0 0 / 0.78) 40%,
      oklch(2% 0 0 / 0.94) 100%
    );
  }

  .content {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    text-align: left;
    position: relative;
    z-index: 1;
    gap: 0;
  }

  .wordmark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 10px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 52px;
  }

  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 100px;
    line-height: 0.88;
    color: #fff;
    letter-spacing: 2px;
    margin-bottom: 48px;
    text-shadow: 0 2px 24px rgba(0,0,0,0.5);
  }

  .headline .amber { color: var(--amber); }

  .value-prop {
    background: var(--amber-bg);
    border: 1px solid var(--amber-border);
    border-radius: 8px;
    padding: 28px 44px;
    margin-bottom: 52px;
    max-width: 760px;
    backdrop-filter: blur(6px);
  }

  .value-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 10px;
  }

  .value-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 44px;
    font-weight: 600;
    color: var(--amber);
    line-height: 1.3;
  }

  .url-row {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
  }

  .url-divider {
    width: 40px;
    height: 1px;
    background: rgba(255,255,255,0.25);
  }

  .url {
    font-family: 'DM Mono', monospace;
    font-size: 30px;
    font-weight: 500;
    color: rgba(255,255,255,0.55);
    letter-spacing: 1px;
  }

  .url span {
    color: #fff;
  }

  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: var(--amber);
    z-index: 2;
  }
</style>
</head>
<body>

<div class="bg" id="bg"></div>

<div class="content">
  <div class="wordmark" data-param="brand">BLOCKSMITH</div>
  <div class="headline" data-param="headline">BUILD YOUR<br><span class="amber">HYROX</span> PLAN</div>
  <div class="value-prop">
    <div class="value-label" data-param="value_label">What you get</div>
    <div class="value-text" data-param="value_text">8 stations prescribed. Every session written. First block free, no card.</div>
  </div>
  <div class="url-row">
    <div class="url-divider"></div>
    <div class="url" data-param="url"><span>blocksmith</span>.training</div>
  </div>
</div>

<div class="bottom-bar"></div>

<script>
  const p = new URLSearchParams(location.search);
  document.querySelectorAll('[data-param]').forEach(el => {
    const v = p.get(el.dataset.param);
    if (v) el.innerHTML = v;
  });
  const bgUrl = p.get('bg_image');
  if (bgUrl) document.getElementById('bg').style.backgroundImage = `url(${bgUrl})`;
</script>
</body>
</html>
