<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blocksmith — Single Stat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700;900&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --amber:       oklch(60% 0.18 42);
    --destructive: oklch(57.7% 0.245 27.3);
    --recovery:    #047857;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #000;
    font-family: 'DM Sans', sans-serif;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 55% at 50% 50%, oklch(60% 0.18 42 / 0.14) 0%, transparent 68%);
    pointer-events: none;
  }

  .brand {
    position: absolute;
    top: 52px;
    left: 60px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 6px;
    color: rgba(255,255,255,0.2);
  }

  .stat-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 1;
  }

  .stat-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 280px;
    line-height: 0.85;
    color: var(--amber);
    letter-spacing: -4px;
  }

  .stat-unit {
    font-family: 'DM Sans', sans-serif;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
    margin-top: 12px;
  }

  .stat-context {
    font-family: 'DM Sans', sans-serif;
    font-size: 26px;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    text-align: center;
    margin-top: 40px;
    max-width: 680px;
    line-height: 1.45;
  }

  .stat-context strong {
    color: rgba(255,255,255,0.85);
    font-weight: 700;
  }

  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: var(--amber);
  }
</style>
</head>
<body>

<div class="brand" data-param="brand">BLOCKSMITH</div>

<div class="stat-wrapper">
  <div class="stat-number" data-param="stat">47</div>
  <div class="stat-unit" data-param="unit">%</div>
  <div class="stat-context" data-param="context">of athletes <strong>blow up on Wall Balls</strong></div>
</div>

<div class="bottom-bar"></div>

<script>
  const p = new URLSearchParams(location.search);
  document.querySelectorAll('[data-param]').forEach(el => {
    const v = p.get(el.dataset.param);
    if (v) el.innerHTML = v;
  });
</script>
</body>
</html>
