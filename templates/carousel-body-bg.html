<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blocksmith — Carousel Body BG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700;900&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --amber:        oklch(60% 0.18 42);
    --amber-bg:     oklch(60% 0.18 42 / 0.14);
    --amber-border: oklch(60% 0.18 42 / 0.35);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #050505;
    font-family: 'DM Sans', sans-serif;
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 80px 88px;
  }

  /* Full-bleed background image */
  .bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    z-index: 0;
  }

  /* Vertical gradient — leans heavier so body copy stays readable */
  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      oklch(2% 0 0 / 0.55) 0%,
      oklch(2% 0 0 / 0.82) 30%,
      oklch(2% 0 0 / 0.90) 70%,
      oklch(2% 0 0 / 0.96) 100%
    );
  }

  .brand {
    position: absolute;
    top: 62px;
    left: 88px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 6px;
    color: rgba(255,255,255,0.4);
    z-index: 2;
  }

  .content {
    margin-top: 120px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .step-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 24px;
  }

  .heading {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 88px;
    line-height: 0.9;
    color: #fff;
    letter-spacing: 1px;
    margin-bottom: 36px;
    text-shadow: 0 2px 24px rgba(0,0,0,0.5);
  }

  .body-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 48px;
    font-weight: 400;
    color: rgba(255,255,255,0.78);
    line-height: 1.5;
    max-width: 820px;
    text-shadow: 0 2px 16px rgba(0,0,0,0.5);
  }

  .body-text strong {
    color: #fff;
    font-weight: 700;
  }

  .data-callout {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: 44px;
    padding: 24px 32px;
    background: var(--amber-bg);
    border: 1px solid var(--amber-border);
    border-radius: 6px;
    max-width: 720px;
    backdrop-filter: blur(4px);
  }

  .data-value {
    font-family: 'DM Mono', monospace;
    font-size: 44px;
    font-weight: 600;
    color: var(--amber);
    letter-spacing: -1px;
    white-space: nowrap;
  }

  .data-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 26px;
    font-weight: 600;
    color: rgba(255,255,255,0.78);
    line-height: 1.4;
  }

  .data-callout.hidden { display: none; }

  .swipe-cta {
    position: absolute;
    bottom: 60px;
    right: 64px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    z-index: 2;
  }

  .swipe-arrow {
    width: 28px;
    height: 1px;
    background: rgba(255,255,255,0.4);
    position: relative;
  }

  .swipe-arrow::after {
    content: '';
    position: absolute;
    right: -1px;
    top: -3px;
    border-left: 7px solid rgba(255,255,255,0.4);
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
  }

  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: rgba(255,255,255,0.10);
    z-index: 2;
  }

  .bottom-bar-fill {
    height: 100%;
    background: var(--amber);
    width: 40%;
  }
</style>
</head>
<body>

<div class="bg" id="bg"></div>

<div class="brand" data-param="brand">BLOCKSMITH</div>

<div class="content">
  <div class="step-label" data-param="step_label">Step 02</div>
  <div class="heading" data-param="heading">SLOW THE<br>LAST 10 METRES</div>
  <div class="body-text" data-param="body">Sprinting into a station spikes your heart rate before you even pick up the implement. <strong>Decelerate</strong> over the final 10m and you'll save 3–5 BPM going into the work.</div>
  <div class="data-callout" id="callout">
    <div class="data-value" data-param="data_value">−4 BPM</div>
    <div class="data-label" data-param="data_label">average HR saving when you brake into the station</div>
  </div>
</div>

<div class="swipe-cta">
  <span data-param="swipe_label">Next</span>
  <div class="swipe-arrow"></div>
</div>

<div class="bottom-bar">
  <div class="bottom-bar-fill" id="progress"></div>
</div>

<script>
  const p = new URLSearchParams(location.search);
  document.querySelectorAll('[data-param]').forEach(el => {
    const v = p.get(el.dataset.param);
    if (v) el.innerHTML = v;
  });
  if (!p.get('data_value')) document.getElementById('callout').classList.add('hidden');
  const prog = p.get('progress');
  if (prog) document.getElementById('progress').style.width = prog;
  const bgUrl = p.get('bg_image');
  if (bgUrl) document.getElementById('bg').style.backgroundImage = `url(${bgUrl})`;
</script>
</body>
</html>
