<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blocksmith — Carousel CTA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700;900&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --amber:        oklch(60% 0.18 42);
    --amber-bg:     oklch(60% 0.18 42 / 0.10);
    --amber-border: oklch(60% 0.18 42 / 0.25);
    --destructive:  oklch(57.7% 0.245 27.3);
    --recovery:     oklch(50.8% 0.105 166);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #000;
    font-family: 'DM Sans', sans-serif;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 88px;
  }

  .content {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    text-align: left;
    position: relative;
    z-index: 1;
    gap: 0;
  }

  .wordmark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 10px;
    color: rgba(255,255,255,0.2);
    margin-bottom: 52px;
  }

  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 96px;
    line-height: 0.88;
    color: #fff;
    letter-spacing: 2px;
    margin-bottom: 48px;
  }

  .value-prop {
    background: var(--amber-bg);
    border: 1px solid var(--amber-border);
    border-radius: 8px;
    padding: 24px 40px;
    margin-bottom: 52px;
    max-width: 700px;
  }

  .value-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 8px;
  }

  .value-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 24px;
    font-weight: 600;
    color: var(--amber);
    line-height: 1.35;
  }

  .url-row {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
  }

  .url-divider {
    width: 40px;
    height: 1px;
    background: rgba(255,255,255,0.15);
  }

  .url {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
  }

  .url span {
    color: rgba(255,255,255,0.7);
  }

  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: var(--amber);
  }
</style>
</head>
<body>

<div class="content">
  <div class="wordmark" data-param="brand">BLOCKSMITH</div>
  <div class="headline" data-param="headline">BUILD YOUR<br>HYROX PLAN</div>
  <div class="value-prop">
    <div class="value-label" data-param="value_label">What you get</div>
    <div class="value-text" data-param="value_text">8 stations prescribed. Every session written. First block free, no card.</div>
  </div>
  <div class="url-row">
    <div class="url-divider"></div>
    <div class="url" data-param="url"><span>blocksmith</span>.training</div>
  </div>
</div>

<div class="bottom-bar"></div>

<script>
  const p = new URLSearchParams(location.search);
  document.querySelectorAll('[data-param]').forEach(el => {
    const v = p.get(el.dataset.param);
    if (v) el.innerHTML = v;
  });
</script>
</body>
</html>
